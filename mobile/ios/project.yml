name: BeanQ
options:
  bundleIdPrefix: com.beanstudio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top

packages:
  StableDiffusion:
    url: https://github.com/apple/ml-stable-diffusion.git
    exactVersion: 1.1.1
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: 0.9.20

targets:
  BeanQ:
    type: application
    platform: iOS
    sources:
      - path: BeanQ
    dependencies:
      - package: StableDiffusion
        product: StableDiffusion
      - package: ZIPFoundation
    entitlements:
      path: BeanQ/BeanQ.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beanstudio.beanq
        PRODUCT_NAME: 豆格Q版
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: 豆格Q版
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.graphics-design
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 选择一张照片，在本机转换成Q版插画。
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 把生成的Q版插画保存到相册。
        SUPPORTS_MACCATALYST: false
        ENABLE_USER_SCRIPT_SANDBOXING: true

schemes:
  BeanQ:
    build:
      targets:
        BeanQ: all
    run:
      config: Debug
    archive:
      config: Release
